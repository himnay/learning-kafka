spring:
  application:
    name: library-events-producer
  profiles:
    active: local
  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: REST API that publishes library events to Kafka
    version: 0.0.1-SNAPSHOT

logging:
  level:
    com.learnkafka: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  kafka:
    template:
      default-topic: library-events
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.IntegerSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        acks: all
        retries: 10
        retry.backoff.ms: 1000
        enable.idempotence: "true"
    admin:
      properties:
        bootstrap.servers: localhost:9092

---
spring:
  config:
    activate:
      on-profile: prod
  kafka:
    template:
      default-topic: library-events
    producer:
      bootstrap-servers: prod-kafka:9092
      key-serializer: org.apache.kafka.common.serialization.IntegerSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        acks: all
        retries: 10
